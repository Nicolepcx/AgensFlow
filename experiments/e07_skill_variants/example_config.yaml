# Example chunk-9 sweep configuration. Copy + edit for production runs.
# `--print-config` shows what the runner WILL use after defaults +
# this file + any CLI overrides are merged.

router:
  max_steps: 18                # chunk-9 variant pool needs more headroom
  enable_skip: true            # let policy learn coordination *choice*
  enable_router_logging: false # flip on only for debugging recursion bugs

policy_graph:
  confidence_threshold: 5
  reliability_weight: 0.5

relative_judge:
  judge_model: "anthropic/claude-haiku-4.5"
  # rubric: ""   # empty → use built-in DEFAULT_RUBRIC

reward:
  ruler_weight: 1.0
  cost_weight: 0.3
  retry_weight: 0.15

governance:
  max_consecutive_failures_per_agent: 5
  max_calls_per_agent: 12
  halt_on_terminal_errors: true

preflight:
  default_checks:
    - openrouter
    - exa
    - tavily
